[advisories]
ignore = [
    # tonic 0.12.3 (transitive via console-subscriber) — optional feature, low risk
    "RUSTSEC-2026-0097",
    # Transitive dependencies with no safe upgrade available
    "RUSTSEC-2025-0141",
    "RUSTSEC-2025-0119",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2024-0320",
    # git2 0.20.4 (build-only via built) — unsound, not in runtime binary
    "RUSTSEC-2026-0183",
    "RUSTSEC-2026-0184",
    # memmap2 0.9.11 (ai-only via tract-onnx) — unsound, only under --features ai
    "RUSTSEC-2026-0186",
    # lru 0.12.5 (transitive via ratatui 0.29) — unsound, cannot pin transitively
    "RUSTSEC-2026-0002",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "OpenSSL",
    "Zlib",
    "CDLA-Permissive-2.0",
    "LGPL-3.0",  # wreq-util (TLS emulation)
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
