[advisories]
ignore = [
    # tonic 0.12.3 (transitive via console-subscriber) — optional feature, low risk
    "RUSTSEC-2026-0097",
    # Transitive dependencies with no safe upgrade available
    "RUSTSEC-2025-0141",
    "RUSTSEC-2025-0119",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2026-0104",
    "RUSTSEC-2024-0320",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "OpenSSL",
    "Zlib",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
