# CI/CD Pipeline for rust_scraper — Stark-Grade 2026
#
# Strategy: ONE compilation per run, cached across all steps.
# Jobs are only split when they truly need separate environments
# (e.g., macOS testing, nightly Miri, security-only tools).
#
# Pipeline flow:
#   build-and-test (single job): fmt → clippy → check → nextest → MCP smoke
#   security (parallel): cargo-deny + cargo-audit (no Rust compile)
#   release (main only, after build+security): cargo build --release with LTO
#   miri (scheduled): UB detection on nightly with Tree Borrows aliasing model
#
# Key optimization: single runner = single compilation, single cache.
# Swatinem/rust-cache restores ~300MB of compiled deps on warm runs.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: "0 0 * * 1"  # Weekly Miri on Monday 00:00 UTC
  workflow_dispatch:

# Cancel redundant runs per PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Forces v4 actions (checkout, cache, upload-artifact, codecov) to run on Node 24
  # instead of deprecated Node 20. Remove when all actions migrate to v5+.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # MAIN PIPELINE: compile ONCE, run all checks in sequence
  # This is the biggest performance win — single cache, single build.
  # ============================================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Free ~30GB: remove pre-installed Android SDK, .NET, Haskell, CodeQL, Docker images
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo apt-get clean
          df -h /

      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache: ~300MB compiled deps restored in seconds on warm runs
      # First run (cold): ~8 min. Warm run: ~2-3 min.
      - uses: Swatinem/rust-cache@v2

      # FAST CHECKS: fmt first (no compile, instant feedback)
      - name: Check formatting
        run: cargo fmt --all -- --check

      # Clippy: compiles + lints in one pass
      - name: Clippy (strict)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Install nextest for faster test execution
      - uses: taiki-e/install-action@nextest

      # GATED: Run all tests with nextest
      - name: Run tests
        run: cargo nextest run --all-features --test-threads 2 --retries 2

      # MCP smoke test: build + validate handshake
      - name: Build MCP server
        run: cargo build --example mcp_server --all-features

      - name: Validate MCP handshake
        run: |
          ./target/debug/examples/mcp_server &
          MCP_PID=$!
          for i in $(seq 1 10); do
            if curl -sf --max-time 2 http://127.0.0.1:8080/mcp -X POST \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}},"id":1}' \
              | grep -q "protocolVersion"; then
              echo "MCP server ready"
              kill $MCP_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          kill $MCP_PID 2>/dev/null || true
          echo "MCP server failed to respond"
          exit 1

  # ============================================================================
  # SECURITY: no Rust compile needed — runs in parallel with build-and-test
  # cargo-deny covers advisories via RustSec + licenses + bans + sources.
  # cargo-audit is a redundant second opinion on advisories (belt + suspenders).
  # ============================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-deny
      - uses: taiki-e/install-action@cargo-audit
      - name: Advisories + licenses + bans + sources
        run: cargo deny check
      # --ignore flags mirror deny.toml [advisories] ignore list.
      # quick-xml 0.39.4 is transitive via plist→syntect (plist 1.9.0 is latest,
      # pins quick-xml 0.39.x). No upstream fix available yet.
      - name: Audit (RustSec, redundant with cargo-deny)
        run: |
          cargo audit \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0320 \
            --ignore RUSTSEC-2026-0183 \
            --ignore RUSTSEC-2026-0184 \
            --ignore RUSTSEC-2026-0186 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195

  # ============================================================================
  # RELEASE: build optimized binary (main only)
  # ============================================================================
  release:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-and-test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Build optimized binary
        run: cargo build --release --locked --features ai
      - name: Strip binary
        run: |
          strip target/release/rust_scraper
          ls -lh target/release/rust_scraper
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust_scraper-linux-x86_64
          path: target/release/rust_scraper
          retention-days: 7

  # ============================================================================
  # SCHEDULED: Miri (UB detection on nightly)
  #
  # Design (three-layer defence):
  #   1. Code level: tests that depend on boring-sys2 FFI (boring2/wreq) or
  #      onig-sys (syntect) use #[cfg_attr(miri, ignore)] or live in
  #      #[cfg(not(miri))] modules. Miri cannot execute C FFI nor inline
  #      assembly (raw-cpuid via quanta/governor).
  #   2. CI safety net: --skip downloader catches any missed FFI tests.
  #   3. Matrix: tests split into parallel groups so ALL failures surface
  #      in ONE run instead of blocking on the first UB.
  #   4. Sysroot cache: cargo miri setup drops from ~15min to ~2s warm.
  #   5. Tree Borrows: aliasing model that tolerates sound-en-practice patterns
  #      (ahash, dashmap, smallvec) while still detecting real UB.
  #      If a specific test fails under Tree Borrows, isolate it with
  #      #[cfg(not(miri))] — never disable aliasing detection globally.
  # ============================================================================
  miri:
    name: Miri (${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false  # show ALL failures, not just the first UB
      matrix:
        group: [core, domain, infra]
        include:
          - group: core
            filter: "-- adapters:: application:: cli:: config:: di:: error::"
          - group: domain
            filter: "-- domain::"
          - group: infra
            filter: "-- infrastructure::"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      # Cache Miri sysroot: ~1GB compiled stdlib, reuses across runs.
      # No rust-toolchain.toml exists — key by OS + manual nightly stamp.
      # On nightly update the cache misses (cold setup once), then repopulates.
      - name: Cache Miri sysroot
        uses: actions/cache@v4
        with:
          path: ~/.cache/miri
          key: miri-sysroot-${{ runner.os }}-2026-05-23
          restore-keys: |
            miri-sysroot-${{ runner.os }}-

      - name: Setup & Run Miri (${{ matrix.group }})
        env:
          # Tree Borrows: aliasing model more permissive than Stacked Borrows.
          # Tolerates sound-in-practice patterns from ahash/dashmap/smallvec/wide,
          # but still detects real aliasing UB (unlike -Zmiri-disable-stacked-borrows).
          # If a third-party crate fails, isolate that test with #[cfg(not(miri))].
          MIRIFLAGS: -Zmiri-tree-borrows -Zmiri-disable-isolation -Zmiri-ignore-leaks -Zmiri-seed=42 -Zmiri-permissive-provenance
        run: |
          cargo miri setup
          cargo miri test --lib -- --skip downloader ${{ matrix.filter }}

  # ============================================================================
  # SCHEDULED: Coverage (manual trigger only)
  # ============================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info -- --skip test_mcp
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
