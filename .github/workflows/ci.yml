# CI/CD Pipeline for rust-scraper — Stark-Grade 2026
#
# Strategy: ONE compilation per run, cached across all steps.
# Jobs are only split when they truly need separate environments
# (e.g., macOS testing, nightly Miri, security-only tools).
#
# Pipeline flow:
#   build-and-test (single job): fmt → clippy → check → nextest → MCP smoke
#   security (after build): cargo-audit + cargo-deny (no Rust compile)
#   release (main only): cargo build --release with LTO
#   miri (scheduled): UB detection on nightly
#
# Key optimization: single runner = single compilation, single cache.
# Swatinem/rust-cache restores ~300MB of compiled deps on warm runs.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"  # Weekly Miri on Monday 00:00 UTC
  workflow_dispatch:

# Cancel redundant runs per PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # MAIN PIPELINE: compile ONCE, run all checks in sequence
  # This is the biggest performance win — single cache, single build.
  # ============================================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache: ~300MB compiled deps restored in seconds on warm runs
      # First run (cold): ~8 min. Warm run: ~2-3 min.
      - uses: Swatinem/rust-cache@v2

      # FAST CHECKS: fmt first (no compile, instant feedback)
      - name: Check formatting
        run: cargo fmt --all -- --check

      # Clippy: compiles + lints in one pass
      - name: Clippy (strict)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Install nextest for faster test execution
      - uses: taiki-e/install-action@nextest

      # GATED: Run all tests with nextest
      - name: Run tests
        run: cargo nextest run --all-features --test-threads 2 --retries 2

      # MCP smoke test: build + validate handshake
      - name: Build MCP server
        run: cargo build --example mcp_server --all-features

      - name: Validate MCP handshake
        run: |
          ./target/debug/examples/mcp_server &
          MCP_PID=$!
          for i in $(seq 1 10); do
            if curl -sf http://127.0.0.1:8080/mcp -X POST \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}},"id":1}' \
              | grep -q "protocolVersion"; then
              echo "MCP server ready"
              kill $MCP_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          kill $MCP_PID 2>/dev/null || true
          echo "MCP server failed to respond"
          exit 1

  # ============================================================================
  # SECURITY: no Rust compile needed — fast standalone job
  # ============================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-deny
      - name: Advisories + licenses + bans + sources
        run: cargo deny check

  # ============================================================================
  # RELEASE: build optimized binary (main only)
  # ============================================================================
  release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [build-and-test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Build optimized binary
        run: cargo build --release --locked --features ai
      - name: Strip binary
        run: |
          strip target/release/rust-scraper
          ls -lh target/release/rust-scraper
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-scraper-linux-x86_64
          path: target/release/rust-scraper
          retention-days: 7

  # ============================================================================
  # SCHEDULED: Miri (UB detection on nightly)
  # ============================================================================
  miri:
    name: Miri (UB Detection)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Setup & Run Miri
        run: |
          cargo miri setup
          cargo miri test -- -Z randomize-seed

  # ============================================================================
  # SCHEDULED: Coverage (manual trigger only)
  # ============================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
