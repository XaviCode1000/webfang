name: CI

"on":
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (for zvec-sys FFI)
        uses: ./.github/actions/setup-deps

      - name: Install Rust (MSRV 1.88)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy, rustfmt
          profile: minimal

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-features --all-targets -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSRV 1.88)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          profile: minimal

      - uses: taiki-e/install-action@cargo-audit
      - name: Check security advisories
        run: cargo audit

  deny:
    name: Deny
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  test:
    name: Test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        toolchain: ["1.88", "stable"]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (for zvec-sys FFI)
        uses: ./.github/actions/setup-deps

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          profile: minimal

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.toolchain }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true

      - uses: taiki-e/install-action@nextest

      - name: Test (PR)
        if: github.event_name == 'pull_request'
        run: cargo nextest run --locked --workspace --all-features --profile ci

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: github.event_name != 'pull_request' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (for zvec-sys FFI)
        uses: ./.github/actions/setup-deps

      - name: Install Rust (MSRV 1.88)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          profile: minimal

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: doc

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true

      - name: Run doctests
        run: cargo test --locked --workspace --features full --doc

      - name: Build docs
        run: cargo doc --locked --workspace --features full --document-private-items --no-deps
