name: CI

"on":
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSRV 1.80)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.80"
          components: clippy, rustfmt
          profile: minimal

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-features --all-targets -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSRV 1.80)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.80"
          profile: minimal

      - uses: taiki-e/install-action@cargo-audit
      - name: Check security advisories
        run: cargo audit
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSRV 1.80)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.80"
          profile: minimal

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test

      - uses: taiki-e/install-action@nextest

      - name: Test (PR)
        if: github.event_name == 'pull_request'
        run: cargo nextest run --locked --workspace --all-features

      - name: Coverage (main/scheduled)
        if: github.event_name != 'pull_request'
        run: |
          rustup component add llvm-tools
          cargo install cargo-llvm-cov
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload coverage
        if: github.event_name != 'pull_request' && secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSRV 1.80)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.80"
          profile: minimal

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: doc

      - name: Run doctests
        run: cargo test --locked --workspace --all-features --doc

      - name: Build docs
        run: cargo doc --locked --workspace --all-features --document-private-items --no-deps
